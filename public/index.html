<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Airspace Insights</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --glass-bg: rgba(10, 10, 14, 0.82);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-border-soft: rgba(255, 255, 255, 0.07);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --text-dim: #71717a;
      --blur: blur(18px) saturate(1.15);
      --accent: rgba(99, 102, 241, 0.7);
      --accent-glow: rgba(99, 102, 241, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: #0a0a12;
    }

    /* ── Full-screen map ── */
    #map { position: absolute; inset: 0; z-index: 1; }
    .leaflet-container { background: #0a0a12; font-family: inherit; }

    /* ── Floating header ── */
    .float-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(6, 6, 10, 0.85);
      backdrop-filter: blur(20px) saturate(1.1);
      -webkit-backdrop-filter: blur(20px) saturate(1.1);
      border-bottom: 1px solid var(--glass-border-soft);
    }
    .float-header .logo {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .float-header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; }
    .float-header h1 span { color: rgba(255, 255, 255, 0.6); font-weight: 400; }

    /* ── Floating control panel (top-left, below header) ── */
    .ctrl-panel {
      position: absolute; top: 60px; left: 10px; z-index: 1000;
      width: 260px;
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .ctrl-panel.collapsed { transform: translateX(-270px); opacity: 0; pointer-events: none; }
    .ctrl-toggle {
      position: absolute; top: 64px; left: 10px; z-index: 1001;
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    .ctrl-toggle.hidden { opacity: 0; pointer-events: none; }

    .ctrl-row { display: flex; gap: 6px; }
    .ctrl-field { display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .ctrl-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); }
    .ctrl-field input, .ctrl-field select {
      background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border-soft);
      border-radius: 8px; padding: 7px 10px; color: var(--text); font-size: 13px;
      outline: none; width: 100%;
    }
    .ctrl-field input:focus, .ctrl-field select:focus {
      border-color: rgba(255, 255, 255, 0.22);
    }
    .ctrl-field select { cursor: pointer; }

    .radius-slider { width: 100%; accent-color: #d4d4d8; height: 4px; cursor: pointer; margin-top: 2px; }

    .presets-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .preset {
      padding: 4px 10px; border-radius: 999px; color: var(--text-muted); font-size: 11px;
      cursor: pointer; background: rgba(255, 255, 255, 0.06); border: 1px solid var(--glass-border-soft);
      transition: all 0.15s; white-space: nowrap;
    }
    .preset:hover { background: rgba(255, 255, 255, 0.12); color: var(--text); }
    .preset-locate { background: rgba(255, 255, 255, 0.1); color: var(--text); font-weight: 500; }

    .ctrl-close {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 6px;
      background: transparent; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    }
    .ctrl-close:hover { color: var(--text); background: rgba(255,255,255,0.08); }

    /* ── FAB Scan Button ── */
    .scan-fab {
      position: absolute; z-index: 1000;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 14px 36px;
      color: #fff; font-size: 15px; font-weight: 700;
      border-radius: 999px; border: 1px solid rgba(139, 92, 246, 0.5);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.8), rgba(139, 92, 246, 0.7));
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .scan-fab:hover { box-shadow: 0 6px 32px rgba(99, 102, 241, 0.55); transform: translateX(-50%) translateY(-2px); }
    .scan-fab:active { transform: translateX(-50%) translateY(0); }
    .scan-fab:disabled { opacity: 0.5; cursor: not-allowed; transform: translateX(-50%); }
    .scan-fab.scanning { animation: fabPulse 1.2s ease-in-out infinite; }
    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4); }
      50% { box-shadow: 0 4px 40px rgba(99, 102, 241, 0.7); }
    }

    /* ── Geolocate button (right side) ── */
    .geo-fab {
      position: absolute; z-index: 1000;
      bottom: 90px; right: 14px;
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      color: var(--text); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .geo-fab:hover { background: rgba(255,255,255,0.12); }
    .geo-fab:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Phase filter chips (floating above FAB) ── */
    .phase-chips {
      position: absolute; z-index: 1000;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
      background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border); border-radius: 10px;
      padding: 5px 8px;
    }
    .phase-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px; font-size: 11px;
      color: var(--text-muted); cursor: pointer; user-select: none;
      border: 1px solid transparent; transition: all 0.15s;
    }
    .phase-chip.active { color: var(--text); background: rgba(255,255,255,0.08); border-color: var(--glass-border-soft); }
    .phase-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .phase-chip input { display: none; }

    /* ── Bottom sheet for results ── */
    .bottom-sheet {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 1100;
      background: rgba(8, 8, 12, 0.95);
      backdrop-filter: blur(24px) saturate(1.1);
      -webkit-backdrop-filter: blur(24px) saturate(1.1);
      border-top: 1px solid var(--glass-border);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 75vh;
      display: flex; flex-direction: column;
    }
    .bottom-sheet.open { transform: translateY(0); }
    .bottom-sheet.peek { transform: translateY(calc(100% - 110px)); }

    .sheet-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2); margin: 10px auto 6px;
      cursor: grab; flex-shrink: 0;
    }

    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 20px 12px; flex-shrink: 0;
      cursor: pointer;
    }
    .sheet-header h2 { font-size: 16px; font-weight: 600; }
    .sheet-header .sheet-sub { font-size: 12px; color: var(--text-dim); }
    .sheet-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border-soft);
      color: var(--text-muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .sheet-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }

    .sheet-body {
      overflow-y: auto; flex: 1;
      padding: 0 16px 24px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Stats row (horizontal scroll on mobile) ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .stat-pill {
      padding: 12px 12px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border-soft);
      min-width: 0; overflow: hidden;
    }
    .stat-pill .sp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 4px; }
    .stat-pill .sp-val { font-size: 22px; font-weight: 700; }
    .stat-pill .sp-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .stat-pill.traffic-low .sp-val { color: #4ade80; }
    .stat-pill.traffic-medium .sp-val { color: #fbbf24; }
    .stat-pill.traffic-high .sp-val { color: #f87171; }

    /* ── Phase bars ── */
    .phase-bars { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .pbar-row { display: flex; align-items: center; gap: 10px; }
    .pbar-label { width: 80px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .pbar-track { flex: 1; height: 20px; background: rgba(0,0,0,0.35); border-radius: 6px; overflow: hidden; border: 1px solid var(--glass-border-soft); }
    .pbar-fill { height: 100%; border-radius: 4px; min-width: 2px; transition: width 0.5s ease; }
    .pbar-fill.landing    { background: linear-gradient(90deg, #22c55e, #16a34a); }
    .pbar-fill.mid-flight { background: linear-gradient(90deg, #a78bfa, #7c3aed); }
    .pbar-fill.cruising   { background: linear-gradient(90deg, rgba(255,255,255,0.45), rgba(212,212,216,0.35)); }
    .pbar-fill.unknown    { background: linear-gradient(90deg, #52525b, #3f3f46); }
    .pbar-count { width: 30px; text-align: right; font-size: 13px; font-weight: 600; }

    /* ── Flight list (card-based for mobile) ── */
    .flight-list { display: flex; flex-direction: column; gap: 8px; }
    .flight-card {
      padding: 12px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border-soft);
      cursor: pointer; transition: background 0.15s;
    }
    .flight-card:hover { background: rgba(255,255,255,0.06); }
    .fc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .fc-callsign { font-size: 15px; font-weight: 700; font-family: monospace; }
    .fc-dist { font-size: 13px; color: var(--text-muted); }
    .fc-details { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 12px; color: var(--text-muted); }
    .fc-details span { white-space: nowrap; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.08); }
    .badge-landing    { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(74,222,128,0.25); }
    .badge-mid-flight { background: rgba(167,139,250,0.12); color: #c4b5fd; border-color: rgba(196,181,253,0.22); }
    .badge-cruising   { background: rgba(255,255,255,0.08); color: #e4e4e7; border-color: rgba(255,255,255,0.15); }
    .badge-unknown    { background: rgba(82,82,91,0.35); color: #a1a1aa; }

    .show-more-btn {
      width: 100%; padding: 10px; border-radius: 10px; margin-top: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border-soft);
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .show-more-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); margin: 16px 0 8px; font-weight: 600;
    }

    /* ── Status / error ── */
    .status-msg { text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px; }
    .status-msg.error { color: #f87171; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.6); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast notifications ── */
    .toast {
      position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 1200; padding: 8px 16px; border-radius: 8px;
      background: rgba(248, 113, 113, 0.9); color: #fff; font-size: 13px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .toast.visible { opacity: 1; }

    /* ── Leaflet overrides ── */
    .leaflet-popup-content-wrapper {
      background: rgba(12, 12, 12, 0.92) !important;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      color: var(--text); border-radius: 12px;
      border: 1px solid var(--glass-border);
    }
    .leaflet-popup-tip { background: rgba(12, 12, 12, 0.92) !important; border: none !important; box-shadow: none !important; }
    .leaflet-popup-content { margin: 10px 12px; font-size: 13px; line-height: 1.5; }
    .leaflet-control-attribution {
      background: rgba(0, 0, 0, 0.65) !important; color: var(--text-dim) !important;
      font-size: 10px !important; border-radius: 6px !important;
      border: 1px solid var(--glass-border-soft) !important;
    }
    .leaflet-control-attribution a { color: var(--text-muted); }
    .leaflet-control-zoom a {
      background: rgba(12, 12, 12, 0.8) !important; color: var(--text) !important;
      border-color: var(--glass-border-soft) !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(30, 30, 40, 0.9) !important; }
    .leaflet-control-zoom { margin-top: 66px !important; }

    .center-pin { background: transparent !important; border: none !important; }
    .center-pin-inner {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(99, 102, 241, 0.7);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.25), 0 0 12px rgba(99,102,241,0.5), 0 4px 16px rgba(0,0,0,0.55);
    }

    .radius-handle { background: transparent !important; border: none !important; cursor: ew-resize !important; }
    .radius-handle-inner {
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(130, 140, 255, 0.9); border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(99,102,241,0.6), 0 2px 8px rgba(0,0,0,0.4);
      cursor: ew-resize;
    }

    .map-legend {
      background: rgba(8, 8, 8, 0.78) !important;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border) !important;
      border-radius: 12px; padding: 10px 12px;
      font-size: 11px; color: var(--text-muted); line-height: 1.65;
    }
    .map-legend strong { color: var(--text); display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
    .map-legend span.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    .map-layer-toggle {
      background: rgba(8, 8, 8, 0.78) !important;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border) !important;
      border-radius: 10px; padding: 4px 6px; display: flex; gap: 3px;
    }
    .map-layer-toggle button {
      padding: 4px 10px; border-radius: 7px; border: 1px solid transparent;
      background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .map-layer-toggle button.active { background: rgba(255,255,255,0.12); color: var(--text); border-color: var(--glass-border); }
    .map-layer-toggle button:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.06); }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      .ctrl-panel { width: 300px; }
      .bottom-sheet { left: auto; width: 400px; right: 0; border-radius: 20px 0 0 0; max-height: 100vh; }
      .scan-fab { bottom: 32px; }
      .phase-chips { bottom: 84px; }
    }
    @media (max-width: 360px) {
      .phase-chip span.phase-text { display: none; }
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Floating header -->
  <div class="float-header">
    <div class="logo">&#9992;</div>
    <h1>Airspace <span>Insights</span></h1>
  </div>

  <!-- Toggle button for controls (visible when panel collapsed) -->
  <button class="ctrl-toggle hidden" id="ctrlToggle" title="Show controls">&#9776;</button>

  <!-- Floating control panel -->
  <div class="ctrl-panel" id="ctrlPanel">
    <button class="ctrl-close" id="ctrlClose" title="Hide controls">&times;</button>
    <div class="ctrl-field">
      <label>Location</label>
      <select id="countrySelect"><option value="">-- Country --</option></select>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-field">
        <label>Lat</label>
        <input type="number" id="lat" step="any" value="28.6139" />
      </div>
      <div class="ctrl-field">
        <label>Lon</label>
        <input type="number" id="lon" step="any" value="77.2090" />
      </div>
    </div>
    <div class="ctrl-field">
      <label>Radius: <strong id="radiusLabel">100</strong> km</label>
      <input type="range" class="radius-slider" id="radiusSlider" min="1" max="500" value="100" />
    </div>
    <div class="presets-row">
      <button class="preset" data-lat="28.6139" data-lon="77.2090" data-r="150">Delhi</button>
      <button class="preset" data-lat="51.4700" data-lon="-0.4543" data-r="80">London</button>
      <button class="preset" data-lat="40.6413" data-lon="-73.7781" data-r="100">NY</button>
      <button class="preset" data-lat="25.2532" data-lon="55.3657" data-r="100">Dubai</button>
      <button class="preset" data-lat="35.5494" data-lon="139.7798" data-r="100">Tokyo</button>
      <button class="preset" data-lat="1.3644" data-lon="103.9915" data-r="80">SG</button>
    </div>
  </div>

  <!-- Phase filter chips -->
  <div class="phase-chips" id="phaseChips">
    <label class="phase-chip active"><input type="checkbox" class="phase-filter" data-phase="landing" checked /><span class="dot" style="background:#22c55e"></span><span class="phase-text">Land</span></label>
    <label class="phase-chip active"><input type="checkbox" class="phase-filter" data-phase="mid-flight" checked /><span class="dot" style="background:#a78bfa"></span><span class="phase-text">Mid</span></label>
    <label class="phase-chip active"><input type="checkbox" class="phase-filter" data-phase="cruising" checked /><span class="dot" style="background:#d4d4d8"></span><span class="phase-text">Cruise</span></label>
    <label class="phase-chip active"><input type="checkbox" class="phase-filter" data-phase="unknown" checked /><span class="dot" style="background:#71717a"></span><span class="phase-text">?</span></label>
  </div>

  <!-- Geolocate button -->
  <button class="geo-fab" id="geolocateBtn" title="My location">&#9737;</button>

  <!-- FAB Scan button -->
  <button class="scan-fab" id="searchBtn">Scan Airspace</button>

  <!-- Toast for errors -->
  <div class="toast" id="toast"></div>

  <!-- Bottom sheet for results -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle" id="sheetHandle"></div>
    <div class="sheet-header" id="sheetHeader">
      <div>
        <h2 id="sheetTitle">Results</h2>
        <div class="sheet-sub" id="sheetSub"></div>
      </div>
      <button class="sheet-close" id="sheetClose">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const $ = (id) => document.getElementById(id);

    let map, centerMarker, radiusCircle, radiusHandle, flightLayer, mapLegend;
    let satelliteLayer, darkLayer, labelsLayer, currentBase = "satellite";
    let countriesData = null;
    let lastFullInsights = null;
    let visibleCount = 20;

    const CLASS_FILL = { landing: "#22c55e", "mid-flight": "#a78bfa", cruising: "#d4d4d8", unknown: "#71717a" };

    function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
    function badge(cls) { return `<span class="badge badge-${cls}">${cls}</span>`; }
    function fmtAlt(m) { return m != null ? Number(m).toFixed(0) + " m" : "N/A"; }
    function fmtSpeed(v) { return v != null ? (Number(v) * 3.6).toFixed(0) + " km/h" : "N/A"; }
    function fmtUtcUnix(sec) { if (sec == null || Number.isNaN(Number(sec))) return "--"; return new Date(Number(sec) * 1000).toISOString().replace("T", " ").slice(0, 19) + " UTC"; }
    function fmtAirport(code) { if (code == null || String(code).trim() === "") return "--"; return escapeHtml(String(code).trim().toUpperCase()); }
    function fmtVerticalMps(v) { if (v == null || Number.isNaN(Number(v))) return "--"; const n = Number(v); const fpm = Math.round(n * 196.85); return (n >= 0 ? "+" : "") + n.toFixed(1) + " m/s"; }
    function trafficLevel(count) { if (count <= 5) return "LOW"; if (count <= 20) return "MEDIUM"; return "HIGH"; }
    function classFill(cls) { return CLASS_FILL[cls] || CLASS_FILL.unknown; }
    function markerRadiusPx(f) { const alt = f.altitude; if (alt == null || Number.isNaN(alt)) return 6; return 4 + Math.min(1, Math.max(0, alt / 12500)) * 10; }

    function toast(msg, duration) {
      const t = $("toast"); t.textContent = msg; t.classList.add("visible");
      setTimeout(() => t.classList.remove("visible"), duration || 3000);
    }

    // ── Map ──
    function edgePoint(lat, lon, radiusKm) {
      const R = 6371, latR = lat * Math.PI / 180, lonR = lon * Math.PI / 180, d = radiusKm / R, bearing = Math.PI / 2;
      const lat2 = Math.asin(Math.sin(latR) * Math.cos(d) + Math.cos(latR) * Math.sin(d) * Math.cos(bearing));
      const lon2 = lonR + Math.atan2(Math.sin(bearing) * Math.sin(d) * Math.cos(latR), Math.cos(d) - Math.sin(latR) * Math.sin(lat2));
      return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getRadius() { return parseInt($("radiusSlider").value, 10); }

    function updateRadiusCircle() {
      const lat = parseFloat($("lat").value), lon = parseFloat($("lon").value), r = getRadius();
      if ([lat, lon, r].some(Number.isNaN) || r <= 0) return;

      if (radiusCircle) map.removeLayer(radiusCircle);
      radiusCircle = L.circle([lat, lon], {
        radius: r * 1000, color: "rgba(130, 140, 255, 0.6)", weight: 2,
        fillColor: "rgba(99, 102, 241, 0.12)", fillOpacity: 1, dashArray: "6 4", bubblingMouseEvents: false,
      }).addTo(map);

      const ep = edgePoint(lat, lon, r);
      if (radiusHandle) {
        radiusHandle.setLatLng(ep);
      } else {
        const icon = L.divIcon({ className: "radius-handle", html: '<div class="radius-handle-inner"></div>', iconSize: [16, 16], iconAnchor: [8, 8] });
        radiusHandle = L.marker(ep, { draggable: true, icon: icon, zIndexOffset: 1000 }).addTo(map);
        radiusHandle.on("dragstart", () => map.dragging.disable());
        radiusHandle.on("drag", () => {
          const hl = radiusHandle.getLatLng(), cLat = parseFloat($("lat").value), cLon = parseFloat($("lon").value);
          let newR = Math.max(1, Math.min(500, Math.round(haversineKm(cLat, cLon, hl.lat, hl.lng))));
          $("radiusSlider").value = newR;
          $("radiusLabel").textContent = newR;
          if (radiusCircle) map.removeLayer(radiusCircle);
          radiusCircle = L.circle([cLat, cLon], {
            radius: newR * 1000, color: "rgba(130, 140, 255, 0.6)", weight: 2,
            fillColor: "rgba(99, 102, 241, 0.12)", fillOpacity: 1, dashArray: "6 4", bubblingMouseEvents: false,
          }).addTo(map);
        });
        radiusHandle.on("dragend", () => {
          map.dragging.enable();
          const cLat = parseFloat($("lat").value), cLon = parseFloat($("lon").value), finalR = getRadius();
          radiusHandle.setLatLng(edgePoint(cLat, cLon, finalR));
        });
      }
    }

    function setCenterFromMap(latlng) {
      $("lat").value = latlng.lat.toFixed(5);
      $("lon").value = latlng.lng.toFixed(5);
      $("countrySelect").value = "";
      updateRadiusCircle();
    }

    function clearFlightMarkers() { if (flightLayer) flightLayer.clearLayers(); }

    function flightPopupHtml(f) {
      const h = f.heading != null && !Number.isNaN(f.heading) ? `<br/>Heading: ${Number(f.heading).toFixed(0)}deg` : "";
      const route = (f.estDepartureAirport || f.estArrivalAirport ? `<br/>Route: ${fmtAirport(f.estDepartureAirport)} -> ${fmtAirport(f.estArrivalAirport)}` : "");
      const vr = f.verticalRate != null ? `<br/>Vertical: ${fmtVerticalMps(f.verticalRate)}` : "";
      return `<strong>${escapeHtml(f.callsign)}</strong><br/>${escapeHtml(f.country)} | ${f.distance} km<br/>Alt: ${fmtAlt(f.altitude)} | Speed: ${fmtSpeed(f.velocity)}<br/>Phase: ${escapeHtml(f.classification)}${h}${vr}${route}`;
    }

    function plotFlights(flights) {
      clearFlightMarkers();
      if (!flights || flights.length === 0) return;
      flights.forEach((f) => {
        L.circleMarker([f.latitude, f.longitude], {
          radius: markerRadiusPx(f), color: "rgba(224,230,240,0.85)", weight: 1,
          fillColor: classFill(f.classification), fillOpacity: 0.9, bubblingMouseEvents: false,
        }).bindPopup(flightPopupHtml(f)).addTo(flightLayer);
      });
    }

    function setBaseLayer(name) {
      currentBase = name;
      if (name === "satellite") { map.removeLayer(darkLayer); map.addLayer(satelliteLayer); map.addLayer(labelsLayer); }
      else { map.removeLayer(satelliteLayer); map.removeLayer(labelsLayer); map.addLayer(darkLayer); }
      document.querySelectorAll(".map-layer-toggle button").forEach((b) => b.classList.toggle("active", b.dataset.layer === name));
    }

    function zoomForCountryArea(areaKm2) {
      if (areaKm2 == null || areaKm2 <= 0) return 6;
      if (areaKm2 > 8e6) return 4; if (areaKm2 > 2e6) return 5; if (areaKm2 > 3e5) return 6; if (areaKm2 > 5e4) return 7; return 8;
    }

    function initMap() {
      const startLat = parseFloat($("lat").value) || 28.6139;
      const startLon = parseFloat($("lon").value) || 77.2090;

      // Single-finger panning enabled! No more two-finger nonsense
      map = L.map("map", {
        scrollWheelZoom: true, dragging: true, tap: true,
        zoomControl: false, maxBounds: [[-85, -180], [85, 180]],
        maxBoundsViscosity: 1.0, minZoom: 2, worldCopyJump: false,
      }).setView([startLat, startLon], 8);

      L.control.zoom({ position: "topright" }).addTo(map);

      satelliteLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        attribution: '&copy; Esri, Maxar', maxZoom: 19, noWrap: true, bounds: [[-85, -180], [85, 180]],
      });
      labelsLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png", {
        subdomains: "abcd", maxZoom: 19, pane: "overlayPane", noWrap: true, bounds: [[-85, -180], [85, 180]],
      });
      darkLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; OSM &copy; CARTO', subdomains: "abcd", maxZoom: 20, noWrap: true, bounds: [[-85, -180], [85, 180]],
      });

      satelliteLayer.addTo(map); labelsLayer.addTo(map);

      // Layer toggle
      const lc = L.control({ position: "topleft" });
      lc.onAdd = function () {
        const div = L.DomUtil.create("div", "map-layer-toggle");
        div.innerHTML = '<button data-layer="satellite" class="active">Satellite</button><button data-layer="dark">Dark</button>';
        L.DomEvent.disableClickPropagation(div);
        div.querySelectorAll("button").forEach((btn) => btn.addEventListener("click", () => setBaseLayer(btn.dataset.layer)));
        return div;
      };
      lc.addTo(map);

      // Center pin
      const centerIcon = L.divIcon({ className: "center-pin", html: '<div class="center-pin-inner"></div>', iconSize: [22, 22], iconAnchor: [11, 11] });
      centerMarker = L.marker([startLat, startLon], { draggable: true, icon: centerIcon }).addTo(map);
      centerMarker.on("dragend", () => setCenterFromMap(centerMarker.getLatLng()));
      centerMarker.on("click", (e) => L.DomEvent.stopPropagation(e));
      map.on("click", (e) => { centerMarker.setLatLng(e.latlng); setCenterFromMap(e.latlng); });

      flightLayer = L.layerGroup().addTo(map);

      // Legend
      mapLegend = L.control({ position: "bottomright" });
      mapLegend.onAdd = function () {
        const div = L.DomUtil.create("div", "map-legend");
        div.innerHTML = "<strong>Flight markers</strong>" +
          '<div><span class="dot" style="background:#22c55e"></span>Landing</div>' +
          '<div><span class="dot" style="background:#a78bfa"></span>Mid-flight</div>' +
          '<div><span class="dot" style="background:#d4d4d8"></span>Cruising</div>' +
          '<div><span class="dot" style="background:#71717a"></span>Unknown</div>' +
          '<div style="margin-top:6px;opacity:0.85;font-size:10px">Size = altitude</div>';
        return div;
      };
      mapLegend.addTo(map);

      updateRadiusCircle();
    }

    // ── Controls ──
    function toggleCtrlPanel(show) {
      $("ctrlPanel").classList.toggle("collapsed", !show);
      $("ctrlToggle").classList.toggle("hidden", show);
    }

    $("ctrlClose").addEventListener("click", () => toggleCtrlPanel(false));
    $("ctrlToggle").addEventListener("click", () => toggleCtrlPanel(true));

    $("radiusSlider").addEventListener("input", () => {
      $("radiusLabel").textContent = $("radiusSlider").value;
      updateRadiusCircle();
    });

    $("lat").addEventListener("change", () => {
      $("countrySelect").value = "";
      centerMarker.setLatLng([parseFloat($("lat").value), parseFloat($("lon").value)]);
      map.panTo(centerMarker.getLatLng());
      updateRadiusCircle();
    });
    $("lon").addEventListener("change", () => {
      $("countrySelect").value = "";
      centerMarker.setLatLng([parseFloat($("lat").value), parseFloat($("lon").value)]);
      map.panTo(centerMarker.getLatLng());
      updateRadiusCircle();
    });

    // Enter key triggers scan from lat/lon inputs
    document.querySelectorAll("#lat, #lon").forEach((el) => {
      el.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); search(); } });
    });

    // Presets — auto-scan on click
    document.querySelectorAll(".preset[data-lat]").forEach((btn) => {
      btn.addEventListener("click", () => {
        $("lat").value = btn.dataset.lat; $("lon").value = btn.dataset.lon;
        $("radiusSlider").value = btn.dataset.r; $("radiusLabel").textContent = btn.dataset.r;
        $("countrySelect").value = "";
        centerMarker.setLatLng([parseFloat(btn.dataset.lat), parseFloat(btn.dataset.lon)]);
        map.setView([parseFloat(btn.dataset.lat), parseFloat(btn.dataset.lon)], 8);
        updateRadiusCircle();
        search();
      });
    });

    // Geolocation
    $("geolocateBtn").addEventListener("click", () => {
      if (!navigator.geolocation) { toast("Geolocation not supported"); return; }
      const btn = $("geolocateBtn"); btn.disabled = true; btn.textContent = "...";
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          $("lat").value = lat.toFixed(5); $("lon").value = lon.toFixed(5);
          $("countrySelect").value = "";
          centerMarker.setLatLng([lat, lon]); map.setView([lat, lon], 10);
          updateRadiusCircle();
          btn.disabled = false; btn.innerHTML = "&#9737;";
          search();
        },
        (err) => {
          btn.disabled = false; btn.innerHTML = "&#9737;";
          const msgs = { 1: "Location denied", 2: "Location unavailable", 3: "Location timed out" };
          toast(msgs[err.code] || "Could not get location");
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // Country selector — auto-scan
    async function initCountries() {
      try {
        const r = await fetch("/api/countries"); if (!r.ok) throw new Error();
        countriesData = await r.json();
        const sel = $("countrySelect");
        countriesData.forEach((c) => { const o = document.createElement("option"); o.value = c.code; o.textContent = c.name; sel.appendChild(o); });
      } catch { $("countrySelect").innerHTML = '<option value="">Countries unavailable</option>'; }
    }

    $("countrySelect").addEventListener("change", () => {
      const code = $("countrySelect").value;
      if (!code || !countriesData) return;
      const c = countriesData.find((x) => x.code === code);
      if (!c) return;
      $("lat").value = Number(c.lat).toFixed(5);
      $("lon").value = Number(c.lon).toFixed(5);
      centerMarker.setLatLng([c.lat, c.lon]);
      map.setView([c.lat, c.lon], zoomForCountryArea(c.area));
      updateRadiusCircle();
      search();
    });

    // ── Phase filters ──
    document.querySelectorAll(".phase-filter").forEach((el) => {
      el.addEventListener("change", () => {
        el.closest(".phase-chip").classList.toggle("active", el.checked);
        applyPhaseFilters();
      });
    });

    function getPhaseFilterSet() {
      const set = new Set();
      document.querySelectorAll(".phase-filter:checked").forEach((el) => set.add(el.dataset.phase));
      return set;
    }

    function applyPhaseFilters() {
      if (!lastFullInsights) return;
      const phases = getPhaseFilterSet();
      const filtered = lastFullInsights.flights.filter((f) => phases.has(f.classification));
      plotFlights(filtered);
      renderResults(lastFullInsights, filtered);
    }

    // ── Bottom sheet ──
    let sheetState = "closed"; // closed, peek, open

    function setSheetState(state) {
      sheetState = state;
      const sheet = $("bottomSheet");
      sheet.classList.remove("open", "peek");
      if (state === "open") sheet.classList.add("open");
      else if (state === "peek") sheet.classList.add("peek");

      // Move FAB and phase chips up when sheet is open
      const fab = $("searchBtn"), chips = $("phaseChips"), geo = $("geolocateBtn");
      if (state === "open") {
        fab.style.display = "none"; chips.style.display = "none"; geo.style.display = "none";
      } else {
        fab.style.display = ""; chips.style.display = ""; geo.style.display = "";
      }
    }

    $("sheetClose").addEventListener("click", () => setSheetState("closed"));
    $("sheetHeader").addEventListener("click", (e) => {
      if (e.target.closest(".sheet-close")) return;
      setSheetState(sheetState === "open" ? "peek" : "open");
    });

    // Touch drag on handle
    let sheetDragStart = null;
    $("sheetHandle").addEventListener("touchstart", (e) => { sheetDragStart = e.touches[0].clientY; }, { passive: true });
    $("sheetHandle").addEventListener("touchend", (e) => {
      if (sheetDragStart === null) return;
      const dy = e.changedTouches[0].clientY - sheetDragStart;
      sheetDragStart = null;
      if (dy > 40) setSheetState(sheetState === "open" ? "peek" : "closed");
      else if (dy < -40) setSheetState("open");
    }, { passive: true });

    // ── Search ──
    async function search() {
      const lat = parseFloat($("lat").value), lon = parseFloat($("lon").value), radius = getRadius();
      if ([lat, lon, radius].some(Number.isNaN)) { toast("Enter valid coordinates"); return; }

      clearFlightMarkers();
      const btn = $("searchBtn"); btn.disabled = true; btn.classList.add("scanning"); btn.textContent = "Scanning...";

      // Show loading in sheet
      $("sheetTitle").textContent = "Scanning...";
      $("sheetSub").textContent = "";
      $("sheetBody").innerHTML = '<div class="status-msg"><div class="spinner"></div>Scanning airspace...</div>';
      setSheetState("peek");

      try {
        const res = await fetch(`/api/flights?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&radius=${encodeURIComponent(radius)}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        lastFullInsights = data;
        visibleCount = 20;
        const phases = getPhaseFilterSet();
        const filtered = data.flights.filter((f) => phases.has(f.classification));

        plotFlights(filtered);

        // Fit map to results
        if (filtered.length > 0) {
          const b = L.latLngBounds([[lat, lon]]);
          filtered.forEach((f) => b.extend([f.latitude, f.longitude]));
          map.fitBounds(b, { padding: [52, 52], maxZoom: 11 });
        }

        renderResults(data, filtered);
        setSheetState("peek");
      } catch (e) {
        lastFullInsights = null; clearFlightMarkers();
        $("sheetTitle").textContent = "Error";
        $("sheetSub").textContent = "";
        const isTimeout = /timeout/i.test(e.message);
        $("sheetBody").innerHTML = `<div class="status-msg error">${escapeHtml(e.message)}<br><br>${isTimeout ? '<span style="color:var(--text-muted);font-size:13px">OpenSky API is slow right now. Try a smaller radius or try again.</span><br><br>' : ''}<button class="show-more-btn" onclick="search()" style="margin:0 auto;max-width:200px">Retry</button></div>`;
        setSheetState("peek");
      } finally {
        btn.disabled = false; btn.classList.remove("scanning"); btn.textContent = "Scan Airspace";
      }
    }

    function renderResults(data, filtered) {
      const total = data.flights.length;
      const shown = filtered.length;
      const tc = trafficLevel(total);
      const tcClass = tc === "LOW" ? "traffic-low" : tc === "MEDIUM" ? "traffic-medium" : "traffic-high";

      $("sheetTitle").textContent = `${total} flights found`;
      $("sheetSub").textContent = `${data.radiusKm} km radius | ${new Date().toLocaleTimeString()}`;

      if (total === 0) {
        $("sheetBody").innerHTML = `<div class="status-msg">No flights detected. OpenSky coverage varies by region — try Europe or North America.</div>`;
        return;
      }

      const breakdown = { landing: 0, "mid-flight": 0, cruising: 0, unknown: 0 };
      data.flights.forEach((f) => breakdown[f.classification]++);

      let html = '';

      // Stats row
      html += `<div class="stats-row">
        <div class="stat-pill ${tcClass}"><div class="sp-label">Traffic</div><div class="sp-val">${tc}</div></div>
        <div class="stat-pill"><div class="sp-label">Total</div><div class="sp-val">${total}</div>${shown !== total ? `<div class="sp-sub">${shown} shown</div>` : ''}</div>
        ${data.nearest ? `<div class="stat-pill"><div class="sp-label">Nearest</div><div class="sp-val">${data.nearest.distance} km</div><div class="sp-sub">${escapeHtml(data.nearest.callsign)}</div></div>` : ''}
      </div>`;

      // Phase bars
      html += '<div class="section-label">Phase breakdown</div><div class="phase-bars">';
      for (const [key, label] of [["landing", "Landing"], ["mid-flight", "Mid-flight"], ["cruising", "Cruising"], ["unknown", "Unknown"]]) {
        if (breakdown[key] === 0 && key === "unknown") continue;
        const pct = Math.round((breakdown[key] / total) * 100);
        html += `<div class="pbar-row"><div class="pbar-label">${label}</div><div class="pbar-track"><div class="pbar-fill ${key}" style="width:${pct}%"></div></div><div class="pbar-count">${breakdown[key]}</div></div>`;
      }
      html += '</div>';

      // Flight cards
      html += '<div class="section-label">Flights</div><div class="flight-list" id="flightList">';
      const toShow = filtered.slice(0, visibleCount);
      toShow.forEach((f) => {
        html += `<div class="flight-card" data-lat="${f.latitude}" data-lon="${f.longitude}">
          <div class="fc-top"><span class="fc-callsign">${escapeHtml(f.callsign)}</span><span class="fc-dist">${f.distance} km</span></div>
          <div class="fc-details">
            <span>${escapeHtml(f.country)}</span>
            <span>Alt: ${fmtAlt(f.altitude)}</span>
            <span>${fmtSpeed(f.velocity)}</span>
            ${badge(f.classification)}
            ${f.estDepartureAirport || f.estArrivalAirport ? `<span>${fmtAirport(f.estDepartureAirport)} -> ${fmtAirport(f.estArrivalAirport)}</span>` : ''}
          </div>
        </div>`;
      });
      html += '</div>';

      if (filtered.length > visibleCount) {
        html += `<button class="show-more-btn" id="showMoreBtn">Show more (${filtered.length - visibleCount} remaining)</button>`;
      }

      $("sheetBody").innerHTML = html;

      // Wire show more
      const moreBtn = $("showMoreBtn");
      if (moreBtn) {
        moreBtn.addEventListener("click", () => {
          visibleCount += 20;
          renderResults(data, filtered);
        });
      }

      // Wire flight card clicks to pan map
      document.querySelectorAll(".flight-card").forEach((card) => {
        card.addEventListener("click", () => {
          const lat = parseFloat(card.dataset.lat), lon = parseFloat(card.dataset.lon);
          map.setView([lat, lon], Math.max(map.getZoom(), 10));
          setSheetState("peek");
        });
      });
    }

    // ── Scan button ──
    $("searchBtn").addEventListener("click", search);

    // ── Boot ──
    async function boot() {
      initMap();
      // Warm up the serverless function immediately so it's ready when user clicks Scan
      fetch("/api/ping").catch(() => {});
      await initCountries();
    }
    boot();
  </script>
</body>
</html>
